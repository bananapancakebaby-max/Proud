<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Proud — Mobile App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDE8DD; --bg-light: #F2EDE4; --bg-card: #E4DED2; --bg-card-inner: #EDE8DD;
  --bg-card-hover: #E2DCCE; --bg-dark: #2C2622;
  --text-primary: #1E1B18; --text-secondary: #5C564D; --text-tertiary: #8F877B;
  --text-ghost: #B8B1A6; --text-on-dark: #EDE8DD;
  --accent-olive: #6B7F4A; --accent-rose: #C47E6E; --accent-amber: #C8923E;
  --accent-slate: #7B8494; --accent-plum: #9B7AA0;
  --border: #D5CFC3; --border-light: #DDD8CD;
  --radius-sm: 10px; --radius-md: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
body { font-family: 'DM Sans', -apple-system, sans-serif; background: #2C2622; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.phone-frame { width: 390px; height: 844px; background: var(--bg-dark); border-radius: 48px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1714, 0 0 0 10px #3a332e, 0 30px 80px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
.notch { width: 120px; height: 28px; background: #1a1714; border-radius: 0 0 18px 18px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
.status-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px 8px; font-size: 14px; font-weight: 600; flex-shrink: 0; background: var(--bg-dark); color: var(--text-on-dark); }
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { width: 16px; height: 16px; }
.app-content { flex: 1; overflow-y: auto; padding: 0 24px 100px; -webkit-overflow-scrolling: touch; background: var(--bg); }
.app-content::-webkit-scrollbar { display: none; }
.month-label { font-family: 'Playfair Display', Georgia, serif; font-size: 30px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
.month-label span { font-weight: 400; color: var(--text-tertiary); font-size: 26px; }
.day-picker { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
.day-picker::-webkit-scrollbar { display: none; }
.day-pill { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 16px 16px; border-radius: 22px; background: var(--bg-card); cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; min-width: 56px; }
.day-pill.active { background: var(--bg-dark); }
.day-pill-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-tertiary); }
.day-pill.active .day-pill-name { color: rgba(237,232,221,0.5); }
.day-pill-num { font-size: 20px; font-weight: 700; color: var(--text-primary); }
.day-pill.active .day-pill-num { color: var(--text-on-dark); }
.greeting { margin-bottom: 8px; }
.greeting-hello { font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1.15; }

/* ═══ HERO HEADER ═══ */
.hero-header { background: var(--bg-dark); margin: 0 -24px; padding: 10px 24px 32px; border-radius: 0 0 50% 50% / 0 0 24px 24px; margin-bottom: 20px; }
.hero-month { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 400; color: rgba(237,232,221,0.4); margin-bottom: 4px; }
.hero-month span { font-weight: 300; }
.hero-greeting { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 700; color: var(--text-on-dark); margin-bottom: 4px; }
.hero-date { font-size: 13px; color: rgba(232,226,214,0.5); }

/* ═══ TAROT (dismissible) ═══ */
.hero-tarot { border-top: 1px solid rgba(232,226,214,0.12); margin-top: 16px; padding-top: 14px; }
.hero-tarot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent-amber); margin-bottom: 6px; }
.hero-tarot-name { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; font-weight: 600; color: var(--text-on-dark); }
.hero-tarot-text { font-size: 13px; color: rgba(232,226,214,0.6); line-height: 1.5; margin-top: 4px; }

.tod-greeting-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent-amber); margin-bottom: 6px; }
.today-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); text-align: center; margin: 12px 0 20px; }
.card-of-day { background: var(--bg-dark); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 30px; border-top: 2px solid rgba(200,146,62,0.4); }
.card-of-day-title { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 700; color: var(--text-on-dark); }
.card-of-day-title em { font-weight: 400; font-style: italic; color: rgba(232,226,214,0.6); font-size: 15px; }
.card-of-day-text { font-size: 14px; color: rgba(232,226,214,0.75); line-height: 1.55; margin-top: 10px; }
.todo-heading { font-family: 'Playfair Display', Georgia, serif; font-size: 30px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.todo-stats { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.todo-stats-left { display: flex; align-items: baseline; gap: 2px; }
.todo-stats-big { font-family: 'DM Sans', sans-serif; font-size: 28px; font-weight: 700; color: var(--text-primary); }
.todo-stats-total { font-size: 15px; color: var(--text-tertiary); font-weight: 400; }
.todo-stats-label { font-size: 12px; color: var(--text-tertiary); font-weight: 500; margin-top: -2px; }
.streak-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-dark); color: var(--text-on-dark); font-size: 12px; font-weight: 700; padding: 8px 16px; border-radius: 100px; }


/* ═══ TASK CARD ═══ */
.task-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 0; position: relative; transition: all 0.2s ease; -webkit-touch-callout: none; }
.task-group { -webkit-touch-callout: none; }
.task-card.completed { opacity: 0.45; }
.task-card.completed .task-title { text-decoration: line-through; text-decoration-color: var(--text-ghost); color: var(--text-tertiary); }
.task-card.completed .task-detail { text-decoration: line-through; opacity: 0.6; }
.task-top { display: flex; align-items: flex-start; gap: 14px; padding-right: 32px; }
.check-circle { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; border: 2.5px solid #1E1B18; margin-top: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; background: transparent; }
.task-card.completed .check-circle { background: var(--text-primary); border-color: var(--text-primary); }
.check-circle svg { width: 14px; height: 14px; color: var(--bg); opacity: 0; }
.task-card.completed .check-circle svg { opacity: 1; }
.task-title { font-size: 18px; font-weight: 600; line-height: 1.35; color: var(--text-primary); }
.task-detail { font-size: 15px; color: var(--text-tertiary); line-height: 1.4; margin-top: -3px; padding-left: 40px; font-style: italic; }
.task-time { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; padding-left: 40px; }
.task-subs-info { font-size: 12px; color: var(--accent-amber); font-weight: 600; margin-top: 6px; padding-left: 40px; }
.task-tags, .group-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-left: 40px; }
/* ═══ SCHEDULE PILLS ═══ */
.sched-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; padding-left: 40px; }
.sched-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); padding: 4px 10px; border-radius: 8px; background: var(--bg-card-inner); border: 1px solid var(--border-light); line-height: 1; }
.sched-pill svg { width: 11px; height: 11px; flex-shrink: 0; stroke: var(--text-tertiary); }
.sched-pill.pill-repeat { gap: 4px; }
.sched-pill.pill-repeat svg { width: 11px; height: 11px; color: #5882C2; stroke: #5882C2; }
.sched-pill.pill-reminder { padding: 4px 8px; }
.sched-pill.pill-reminder svg { width: 11px; height: 11px; stroke: var(--accent-amber); }
.task-group > .sched-pills { padding-left: 40px; }

.tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 8px; color: #fff; line-height: 1; opacity: 0.72; }
.tag-home { background: var(--accent-olive); }
.tag-office { background: var(--accent-rose); }
.tag-personal { background: var(--accent-amber); }
.tag-health { background: var(--accent-slate); }
.tag-creative { background: var(--accent-plum); }

/* ═══ TASK GROUP ═══ */
.task-group { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 0; position: relative; transition: all 0.2s ease; }
.task-group.all-done { opacity: 0.5; }
.task-group.all-done .group-title { text-decoration: line-through; color: var(--text-tertiary); }
.task-group.all-done .group-circle { background: var(--text-primary); border-color: var(--text-primary); }
.task-group.all-done .group-circle svg { opacity: 1; color: var(--bg); }
.group-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.group-title-row { display: flex; align-items: flex-start; gap: 14px; flex: 1; }
.group-circle { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; border: 2.5px solid #1E1B18; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; background: transparent; margin-top: 2px; }
.group-circle svg { width: 14px; height: 14px; color: var(--bg); opacity: 0; }
.group-title { font-size: 18px; font-weight: 600; line-height: 1.35; color: var(--text-primary); }
.group-header-actions { display: flex; gap: 4px; align-items: center; }
.group-folder-btn, .group-menu-btn { width: 32px; height: 32px; border: none; background: transparent; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-ghost); padding: 0; }
.group-folder-btn svg, .group-menu-btn svg { width: 18px; height: 18px; }
.group-progress-bar { display: flex; align-items: center; gap: 10px; padding-left: 40px; margin-bottom: 12px; margin-top: 4px; }
.group-progress-dots { display: flex; align-items: center; gap: 5px; flex: 1; flex-wrap: wrap; }
.gp-dot { width: 14px; height: 14px; border-radius: 50%; background: transparent; border: 1px solid var(--text-primary); transition: all 0.3s ease; flex-shrink: 0; }
.gp-dot.filled { background: var(--text-primary); border-color: var(--text-primary); }
.group-percent { font-size: 15px; color: var(--text-primary); font-weight: 600; flex-shrink: 0; }
.task-group.collapsed .subtask-list { display: none; }
.task-group.collapsed .group-header { margin-bottom: 10px; }
.group-collapsed-row { display: none; }
.collapsed-row-top { display: flex; align-items: center; gap: 6px; }
.collapsed-row-dots { display: flex; align-items: center; gap: 4px; flex: 1; flex-wrap: wrap; }
.collapsed-row-dots .gp-dot { width: 13px; height: 13px; }
.collapsed-row-count { font-size: 14px; color: var(--text-primary); font-weight: 600; flex-shrink: 0; }
.collapsed-row-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.subtask-list { display: flex; flex-direction: column; padding: 0 0 0 16px; }
.subtask-item { display: flex; gap: 14px; position: relative; }
.subtask-node { display: flex; flex-direction: column; align-items: center; width: 22px; flex-shrink: 0; }
.sub-circle { width: 20px; height: 20px; min-width: 20px; border-radius: 50%; border: 2px solid #1E1B18 !important; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; z-index: 1; box-sizing: border-box; }
.sub-circle svg { width: 11px; height: 11px; color: #fff; opacity: 0; }
.subtask-item.done .sub-circle { background: #1E1B18 !important; border-color: #1E1B18 !important; }
.subtask-item.done .sub-circle svg { opacity: 1; }
.sub-line { width: 2px; flex: 1; background: #1E1B18; min-height: 18px; }
.subtask-item:last-child .sub-line { display: none; }
.subtask-content { padding-bottom: 30px; flex: 1; min-width: 0; }
.subtask-item:last-child .subtask-content { padding-bottom: 6px; }
.sub-title { font-size: 15px; font-weight: 500; line-height: 1.35; color: var(--text-primary); }
.subtask-item.done .sub-title { text-decoration: line-through; color: var(--text-tertiary); }
.task-more { position: absolute; top: 16px; right: 14px; width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-ghost); z-index: 5; padding: 0; }
.task-more svg { width: 18px; height: 18px; }

/* ═══ SWIPE ACTIONS ═══ */
.swipe-wrapper { position: relative; overflow: hidden; border-radius: var(--radius-md); margin-bottom: 12px; -webkit-tap-highlight-color: transparent; }
.swipe-actions-left { position: absolute; top: 0; bottom: 0; left: 0; width: 90px; display: flex; align-items: center; justify-content: center; background: var(--accent-olive); border-radius: var(--radius-md) 0 0 var(--radius-md); opacity: 0; transition: opacity 0.15s ease; }
.swipe-actions-right { position: absolute; top: 0; bottom: 0; right: 0; width: 90px; display: flex; align-items: center; justify-content: center; background: #D4645C; border-radius: 0 var(--radius-md) var(--radius-md) 0; opacity: 0; transition: opacity 0.15s ease; }
.swipe-wrapper.swiping .swipe-actions-left, .swipe-wrapper.swiping .swipe-actions-right { opacity: 1; }
.swipe-actions-left svg, .swipe-actions-right svg { width: 24px; height: 24px; color: #fff; }
.swipe-inner { position: relative; z-index: 2; transition: transform 0.3s ease; }
.swipe-wrapper .task-card, .swipe-wrapper .task-group { margin-bottom: 0; }


/* ═══ BOTTOM SHEET ═══ */
.bottom-sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; opacity: 0; transition: opacity 0.25s ease; pointer-events: none; border-radius: 48px; }
.bottom-sheet-overlay.active { opacity: 1; pointer-events: all; }
.bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg); border-radius: 24px 24px 0 0; padding: 14px 24px 40px; z-index: 51; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height: 70vh; overflow-y: auto; }
.bottom-sheet.active { transform: translateY(0); }
.bottom-sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.bottom-sheet-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 18px; }
.bs-option { display: flex; align-items: center; gap: 16px; padding: 18px 4px; border-bottom: 1px solid var(--border-light); cursor: pointer; border-radius: 8px; -webkit-tap-highlight-color: transparent; }
.bs-option:last-child { border-bottom: none; }
.bs-option:active { background: var(--bg-card); }
.bs-option-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.bs-option-icon svg { width: 20px; height: 20px; color: var(--text-secondary); }
.bs-option-icon.danger { background: rgba(212,100,92,0.1); }
.bs-option-icon.danger svg { color: #D4645C; }
.bs-option-text { font-size: 16px; font-weight: 500; color: var(--text-primary); }
.bs-option-text.danger { color: #D4645C; }


/* ═══ INLINE EDIT ═══ */
.inline-edit { font-family: 'DM Sans', sans-serif; background: transparent; border: none; padding: 0; outline: none; width: 100%; color: var(--text-primary); font-size: inherit; font-weight: inherit; }

/* ═══ ADD TASK FORM (mobile) ═══ */
.add-task-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 60; opacity: 0; transition: opacity 0.25s ease; pointer-events: none; border-radius: 48px; }
.add-task-overlay.active { opacity: 1; pointer-events: all; }
.add-task-form { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg); border-radius: 24px 24px 0 0; padding: 14px 24px 40px; z-index: 61; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); height: 50%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
.add-task-form.active { transform: translateY(0); }
.add-task-form::-webkit-scrollbar { display: none; }
.atf-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 6px; flex-shrink: 0; }
.add-task-form input { font-family: 'DM Sans', sans-serif; font-size: 16px; padding: 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg-card); color: var(--text-primary); outline: none; -webkit-appearance: none; }
.add-task-form input:focus { border-color: var(--accent-amber); }
.add-task-form input::placeholder { color: var(--text-ghost); }
.atf-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.atf-tag-option { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 16px; border-radius: 100px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s ease; min-height: 36px; display: inline-flex; align-items: center; color: #fff; border: 2px solid transparent; opacity: 0.5; }
.atf-tag-option[data-tag="home"] { background: var(--accent-olive); }
.atf-tag-option[data-tag="office"] { background: var(--accent-rose); }
.atf-tag-option[data-tag="personal"] { background: var(--accent-amber); }
.atf-tag-option[data-tag="health"] { background: var(--accent-slate); }
.atf-tag-option[data-tag="creative"] { background: var(--accent-plum); }
.atf-tag-option.selected { opacity: 1; }
.atf-actions { display: flex; gap: 8px; }
.atf-actions button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.add-task-form .sched-grid { margin-bottom: 0; }
.add-task-form .sched-grid-dropdown { margin: 0; }
.atf-save { background: var(--bg-dark); color: var(--text-on-dark); }
.atf-cancel { background: transparent; color: var(--text-tertiary); }


/* ═══ EDIT PANEL — GRID SCHEDULE ═══ */
.edit-panel-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); z-index: 20; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; border-radius: 48px; }
.edit-panel-overlay.active { opacity: 1; pointer-events: all; }
.edit-panel { position: absolute; bottom: 0; left: 0; right: 0; height: 100%; background: var(--bg); border-radius: 0; z-index: 21; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,0.15); }
.edit-panel.active { transform: translateY(0); }
.edit-panel-handle { display: none; }
.edit-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 48px 24px 8px; flex-shrink: 0; }
.edit-panel-close { width: 36px; height: 36px; border: none; background: var(--bg-card); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-tertiary); }
.edit-panel-close svg { width: 16px; height: 16px; }
.edit-panel-done { border: none; background: var(--bg-dark); border-radius: 100px; padding: 10px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--text-on-dark); cursor: pointer; display: flex; align-items: center; gap: 6px; -webkit-tap-highlight-color: transparent; }
.edit-panel-done:active { opacity: 0.85; }
.edit-panel-done svg { width: 16px; height: 16px; }
.edit-panel-delete-bottom { border: none; background: none; color: var(--text-ghost); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; cursor: pointer; padding: 18px 0; width: 100%; text-align: center; margin-top: 24px; border-top: 1px solid var(--border-light); }
.edit-panel-delete-bottom:active { color: #D4645C; }

.edit-panel-body { flex: 1; overflow-y: auto; padding: 8px 24px 24px; }
.edit-panel-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text-primary); border: none; background: transparent; width: 100%; outline: none; padding: 4px 0 6px; margin-bottom: 4px; }
.edit-panel-title::placeholder { color: var(--text-ghost); }
.edit-detail-input { font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--text-tertiary); border: none; background: transparent; width: 100%; outline: none; padding: 0 0 16px; font-style: italic; margin-bottom: 16px; }
.edit-detail-input::placeholder { color: var(--text-ghost); }

/* Schedule Grid */
.sched-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.sched-grid-item { background: var(--bg-card); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.15s ease; border: 1.5px solid transparent; -webkit-tap-highlight-color: transparent; }
.sched-grid-item svg { width: 22px; height: 22px; color: var(--text-tertiary); transition: color 0.15s; }

function loadTasks() { try { const r = localStorage.getItem('proud_' + dateKey(currentDate)); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function tagHTML(tags) {

function schedPillsHTML(item) {

  const INBOX_SVG = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>';
  
  function getBlock(item) {
    if (!item.dueTime) return 'anytime';
    const h = parseInt(item.dueTime.split(':')[0]);
    if (h < 12) return 'morning';
    if (h < 17) return 'afternoon';
    return 'evening';

  tasks.forEach(item => blocks[getBlock(item)].push(item));

    blocks[b].sort((a, b) => (a.dueTime || '').localeCompare(b.dueTime || ''));

    anytime: { label: 'Anytime', icon: INBOX_SVG, cls: 'anytime' }
  };
  
  ['morning', 'afternoon', 'evening', 'anytime'].forEach(blockKey => {

      list.appendChild(wrapper);
      initSwipe(wrapper, item);
    });
  });

  initInteractions();
}

function renderCard(item) {
  const el = document.createElement('div');
  el.className = 'task-card' + (item.completed ? ' completed' : '');
  el.dataset.id = item.id;
  const subs = item.subtasks || [];
  const subsDone = subs.filter(s => s.done).length;
  const total = subs.length;
  
  // Schedule pills
  const schedHTML = schedPillsHTML(item);
  
  // Progress dots + subtask list (like groups)
  let progressHTML = '';
  let subsHTML = '';
  if (total > 0) {
    const pct = Math.round(subsDone / total * 100);
    const filled = Math.round((subsDone / total) * 10);
    const dotsHTML = Array.from({length:10}, (_,i) => `<div class="gp-dot${i < filled ? ' filled' : ''}"></div>`).join('');
    progressHTML = `<div class="group-progress-bar"><div class="group-progress-dots">${dotsHTML}</div><span class="group-percent">${pct}%</span></div>`;
    subs.forEach((s, i) => {
      const last = i === total - 1;
      subsHTML += `<div class="subtask-item${s.done ? ' done' : ''}" data-subid="${s.id}"><div class="subtask-node"><div class="sub-circle" style="border:2px solid #1E1B18">${CHECK_SVG}</div>${!last ? '<div class="sub-line" style="background:#1E1B18"></div>' : ''}</div><div class="subtask-content"><div class="sub-title">${esc(s.title)}</div></div></div>`;
    });
    subsHTML = `<div class="subtask-list">${subsHTML}</div>`;
  }
  
  el.innerHTML = `<button class="task-more">${MENU_SVG}</button><div class="task-top"><div class="check-circle">${CHECK_SVG}</div><div class="task-title">${esc(item.title)}</div></div>${item.detail ? `<div class="task-detail">${esc(item.detail)}</div>` : ''}${progressHTML}${subsHTML}${schedHTML}${item.tags.length ? `<div class="task-tags">${tagHTML(item.tags)}</div>` : ''}`;
  return el;
}

function renderGroup(item) {
  const el = document.createElement('div');
  el.className = 'task-group' + (item.collapsed ? ' collapsed' : '');
  el.dataset.id = item.id;
  const total = item.subtasks.length, done = item.subtasks.filter(s => s.done).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const filled = total > 0 ? Math.round((done / total) * 10) : 0;
  if (total > 0 && done === total) el.classList.add('all-done');
  const dotsHTML = Array.from({length:10}, (_,i) => `<div class="gp-dot${i < filled ? ' filled' : ''}"></div>`).join('');
  const tHTML = item.tags.length ? tagHTML(item.tags) : '';
  let subsHTML = '';
  item.subtasks.forEach((s, i) => {
    const last = i === item.subtasks.length - 1;
    subsHTML += `<div class="subtask-item${s.done ? ' done' : ''}" data-subid="${s.id}"><div class="subtask-node"><div class="sub-circle" style="border:2px solid #1E1B18">${CHECK_SVG}</div>${!last ? '<div class="sub-line" style="background:#1E1B18"></div>' : ''}</div><div class="subtask-content"><div class="sub-title">${esc(s.title)}</div></div></div>`;
  });
  const groupSchedHTML = schedPillsHTML(item);
  el.innerHTML = `<div class="group-header"><div class="group-title-row"><div class="group-circle">${CHECK_SVG}</div><span class="group-title">${esc(item.title)}</span></div><div class="group-header-actions"><button class="group-folder-btn">${FOLDER_SVG}</button><button class="group-menu-btn">${MENU_SVG}</button></div></div>${item.detail ? `<div class="task-detail">${esc(item.detail)}</div>` : ''}<div class="group-progress-bar"><div class="group-progress-dots">${dotsHTML}</div><span class="group-percent">${pct}%</span></div><div class="subtask-list">${subsHTML}</div>${groupSchedHTML}${tHTML ? `<div class="group-tags">${tHTML}</div>` : ''}<div class="group-collapsed-row"><div class="collapsed-row-top"><div class="collapsed-row-dots">${dotsHTML}</div><span class="collapsed-row-count">${pct}%</span></div>${tHTML ? `<div class="collapsed-row-tags">${tHTML}</div>` : ''}</div>`;
  return el;
}

function updateStats() {
  let total = 0, done = 0;
  tasks.forEach(item => {
    if (item.type === 'task') { total++; if (item.completed) done++; }
    else { item.subtasks.forEach(s => { total++; if (s.done) done++; }); }
  });
  const bigEl = document.querySelector('.todo-stats-big');
  const totalEl = document.querySelector('.todo-stats-total');
  if (bigEl) bigEl.textContent = done;
  if (totalEl) totalEl.textContent = ' / ' + total;
}

// ═══ SWIPE GESTURE ═══
function initSwipe(wrapper, item) {
  const inner = wrapper.querySelector('.swipe-inner');
  let startX = 0, startY = 0, currentX = 0, swiping = false, direction = null;
  inner.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    currentX = 0; swiping = true; direction = null;
    inner.style.transition = 'none';
  }, { passive: true });
  inner.addEventListener('touchmove', e => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    
    // Determine direction on first significant move
    if (!direction) {
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      direction = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
    
    // If vertical scroll, let it through
    if (direction === 'v') return;
    
    // Horizontal swipe — prevent scroll and move card
    e.preventDefault();
    wrapper.classList.add('swiping');
    currentX = Math.max(-100, Math.min(100, dx));
    inner.style.transform = `translateX(${currentX}px)`;
  }, { passive: false });
  inner.addEventListener('touchend', () => {
    swiping = false;
    direction = null;
    inner.style.transition = 'transform 0.3s ease';
    
    if (currentX > 60 && item.type === 'task') {
      inner.style.transform = 'translateX(0)';
      setTimeout(() => {
        item.completed = !item.completed;
        saveTasks();
        const card = inner.querySelector('.task-card');
        if (card) card.classList.toggle('completed', item.completed);
        updateStats();
      }, 200);
    } else if (currentX < -60) {
      inner.style.transform = 'translateX(-120%)';
      setTimeout(() => {
        wrapper.style.transition = 'opacity 0.2s ease, height 0.2s ease, margin 0.2s ease';
        wrapper.style.opacity = '0';
        wrapper.style.height = '0';
        wrapper.style.marginBottom = '0';
        wrapper.style.overflow = 'hidden';
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== item.id);
          saveTasks();
          wrapper.remove();
          updateStats();
        }, 200);
      }, 100);
    } else {
      inner.style.transform = 'translateX(0)';
    }
    currentX = 0;
    setTimeout(() => wrapper.classList.remove('swiping'), 300);
  });
}

// ═══ REORDER ═══
function moveTask(item, dir) {
  const idx = tasks.indexOf(item);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= tasks.length) return;
  tasks.splice(idx, 1);
  tasks.splice(newIdx, 0, item);
  saveTasks();
  renderAll();
}

function startInlineEdit(el, text, onSave) {

  input.style.fontSize = window.getComputedStyle(el).fontSize;

  const actions = document.createElement('div');
  actions.className = 'atf-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'atf-save';
  saveBtn.textContent = 'Add Task';
  saveBtn.addEventListener('click', () => {
    const title = titleInput.value.trim();
    if (!title) return;
    const tags = getSelectedTags();
    const detail = detailInput.value.trim();
    
    if (isGroup) {
      const subs = tempSubs.filter(s => s.title.trim()).map(s => mkSub(s.title.trim(), ''));
      const item = mkGroup(title, detail, tags, subs);
      item.dueDate = tempItem.dueDate;
      item.dueTime = tempItem.dueTime;
      item.reminder = tempItem.reminder;
      item.repeat = tempItem.repeat;
      tasks.push(item);
    } else {
      const item = mkTask(title, detail, '', tags);
      item.dueDate = tempItem.dueDate;
      item.dueTime = tempItem.dueTime;
      item.reminder = tempItem.reminder;
      item.repeat = tempItem.repeat;
      tasks.push(item);
    }
    saveTasks(); closeAddForm(); renderAll();
  });
  
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'atf-cancel';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', closeAddForm);
  
  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);
  form.appendChild(actions);
  
  const phone = document.querySelector('.phone-frame');
  phone.appendChild(overlay);
  phone.appendChild(form);
  
  requestAnimationFrame(() => {
    overlay.classList.add('active');
    form.classList.add('active');
    setTimeout(() => titleInput.focus(), 300);
  });
}

function closeAddForm() {
  const overlay = document.querySelector('.add-task-overlay');
  const form = document.querySelector('.add-task-form');
  if (overlay) { overlay.classList.remove('active'); setTimeout(() => overlay.remove(), 300); }
  if (form) { form.classList.remove('active'); setTimeout(() => form.remove(), 300); }
}



// ═══ INTERACTIONS ═══
function initInteractions() {
  // Check circles
  document.querySelectorAll('.task-card .check-circle').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const card = el.closest('.task-card');
      const item = tasks.find(t => t.id === card.dataset.id);
      if (!item) return;
      item.completed = !item.completed;
      card.classList.toggle('completed');
      saveTasks(); updateStats();
    });
  });
  // Tap task card to open edit panel
  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.check-circle') || e.target.closest('.task-more')) return;
      const item = tasks.find(t => t.id === card.dataset.id);
      if (item) openEditPanel(item);
    });
  });
  // Tap group to open edit panel
  document.querySelectorAll('.task-group').forEach(group => {
    group.addEventListener('click', e => {
      if (e.target.closest('.check-circle') || e.target.closest('.group-circle') || e.target.closest('.sub-circle') || e.target.closest('.group-folder-btn') || e.target.closest('.group-menu-btn') || e.target.closest('.group-collapsed-row')) return;
      const item = tasks.find(t => t.id === group.dataset.id);
      if (item) openEditPanel(item);
    });
  });
  // Group circle — mark all subtasks done/undone
  document.querySelectorAll('.group-circle').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const group = el.closest('.task-group');
      const item = tasks.find(t => t.id === group.dataset.id);
      if (!item || !item.subtasks) return;
      const allDone = item.subtasks.every(s => s.done);
      item.subtasks.forEach(s => s.done = !allDone);
      saveTasks();
      renderAll();
    });
  });
  // Sub circles
  document.querySelectorAll('.sub-circle').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const subItem = el.closest('.subtask-item');
      const parent = el.closest('.task-group') || el.closest('.task-card');
      if (!parent) return;
      const pData = tasks.find(t => t.id === parent.dataset.id);
      if (!pData || !pData.subtasks) return;
      const sub = pData.subtasks.find(s => s.id === subItem.dataset.subid);
      if (!sub) return;
      sub.done = !sub.done;
      subItem.classList.toggle('done');
      // Update progress
      const total = pData.subtasks.length, done = pData.subtasks.filter(s => s.done).length;
      const pct = total > 0 ? Math.round(done / total * 100) : 0, filled = Math.round((done / total) * 10);
      parent.classList.toggle('all-done', total > 0 && done === total);
      parent.querySelectorAll('.group-progress-dots, .collapsed-row-dots').forEach(c => {
        c.querySelectorAll('.gp-dot').forEach((d, i) => d.classList.toggle('filled', i < filled));
      });
      parent.querySelectorAll('.group-percent, .collapsed-row-count').forEach(el => el.textContent = pct + '%');
      saveTasks(); updateStats();
    });
  });
  // Folder collapse
  document.querySelectorAll('.group-folder-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const group = btn.closest('.task-group');
      group.classList.toggle('collapsed');
      const item = tasks.find(t => t.id === group.dataset.id);
      if (item) { item.collapsed = group.classList.contains('collapsed'); saveTasks(); }
    });
  });
  // Collapsed row expand
  document.querySelectorAll('.group-collapsed-row').forEach(row => {
    row.addEventListener('click', () => {
      const group = row.closest('.task-group');
      group.classList.toggle('collapsed');
      const item = tasks.find(t => t.id === group.dataset.id);
      if (item) { item.collapsed = group.classList.contains('collapsed'); saveTasks(); }
    });
  });
  // Task menu (bottom sheet)
  document.querySelectorAll('.task-card .task-more').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const card = btn.closest('.task-card');
      const item = tasks.find(t => t.id === card.dataset.id);
      if (!item) return;
      openBottomSheet(item.title, [
        { label: 'Move Up', icon: ARROW_UP_SVG, action: () => moveTask(item, -1) },
        { label: 'Move Down', icon: ARROW_DOWN_SVG, action: () => moveTask(item, 1) },
        { label: 'Edit Title', icon: EDIT_SVG, action: () => {
          const titleEl = document.querySelector(`.task-card[data-id="${item.id}"] .task-title`);
          if (titleEl) startInlineEdit(titleEl, item.title, val => { item.title = val || item.title; saveTasks(); renderAll(); });
        }},
        { label: item.completed ? 'Mark Incomplete' : 'Mark Complete', icon: CHECK_SVG, action: () => { item.completed = !item.completed; saveTasks(); renderAll(); }},
        { label: 'Delete Task', icon: DELETE_SVG, danger: true, action: () => { tasks = tasks.filter(t => t.id !== item.id); saveTasks(); renderAll(); }}
      ]);
    });
  });
  // Group menu (bottom sheet)
  document.querySelectorAll('.group-menu-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const group = btn.closest('.task-group');
      const item = tasks.find(t => t.id === group.dataset.id);
      if (!item) return;
      openBottomSheet(item.title, [
        { label: 'Move Up', icon: ARROW_UP_SVG, action: () => moveTask(item, -1) },
        { label: 'Move Down', icon: ARROW_DOWN_SVG, action: () => moveTask(item, 1) },
        { label: 'Edit Title', icon: EDIT_SVG, action: () => {
          const titleEl = document.querySelector(`.task-group[data-id="${item.id}"] .group-title`);
          if (titleEl) startInlineEdit(titleEl, item.title, val => { item.title = val || item.title; saveTasks(); renderAll(); });
        }},
        { label: 'Add Step', icon: PLUS_SVG, action: () => {
          item.subtasks.push(mkSub('New step', ''));
          item.collapsed = false;
          saveTasks(); renderAll();
        }},
        { label: 'Delete Group', icon: DELETE_SVG, danger: true, action: () => { tasks = tasks.filter(t => t.id !== item.id); saveTasks(); renderAll(); }}
      ]);
    });
  });

}


// ═══ EDIT PANEL ═══
const editOverlay = document.querySelector('.edit-panel-overlay');
const editPanel = document.querySelector('.edit-panel');
const editBody = document.querySelector('.edit-panel-body');
const editClose = document.querySelector('.edit-panel-close');
const editDone = document.querySelector('.edit-panel-done');
// Delete is now inline per panel open
let editingItem = null;

function openEditPanel(item) {
  editingItem = item;
  editBody.innerHTML = '';
  
  // Title input
  const titleInput = document.createElement('input');
  titleInput.className = 'edit-panel-title';
  titleInput.value = item.title;
  titleInput.placeholder = 'Task name';
  titleInput.addEventListener('input', () => { item.title = titleInput.value; saveTasks(); });
  editBody.appendChild(titleInput);
  
  // Detail input
  const detailInput = document.createElement('input');
  detailInput.className = 'edit-detail-input';
  detailInput.value = item.detail || '';
  detailInput.placeholder = 'Add a note...';
  detailInput.addEventListener('input', () => { item.detail = detailInput.value; saveTasks(); });
  editBody.appendChild(detailInput);
  
  // ═══ SCHEDULE GRID ═══
  const grid = document.createElement('div');
  grid.className = 'sched-grid';
  
  const gridDropdown = document.createElement('div');
  gridDropdown.className = 'sched-grid-dropdown';
  let activeGridPanel = null;
  
  function closeGridPanel() { gridDropdown.innerHTML = ''; activeGridPanel = null; }
  
  // Date tile
  const dateTile = document.createElement('div');
  dateTile.className = 'sched-grid-item' + (item.dueDate ? ' set' : '');
  dateTile.innerHTML = ICAL_SVG + '<span class="gi-label">Date</span><span class="gi-value">' + (fmtDate(item.dueDate) || 'Not set') + '</span>';
  
  let calMonth = item.dueDate ? new Date(item.dueDate+'T00:00:00').getMonth() : new Date().getMonth();
  let calYear = item.dueDate ? new Date(item.dueDate+'T00:00:00').getFullYear() : new Date().getFullYear();
  
  function renderGridCal() {
    const today = new Date(); today.setHours(0,0,0,0);
    const todayISO = today.toISOString().slice(0,10);
    const tmrw = new Date(today); tmrw.setDate(tmrw.getDate()+1);
    const tmrwISO = tmrw.toISOString().slice(0,10);
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const dim = new Date(calYear, calMonth+1, 0).getDate();
    const prevDim = new Date(calYear, calMonth, 0).getDate();
    
    let h = '<div class="cal-picker"><div class="cal-header">';
    h += '<button class="cal-nav" data-dir="-1"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>';
    h += '<span class="cal-month">'+MONTHS[calMonth]+' '+calYear+'</span>';
    h += '<button class="cal-nav" data-dir="1"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>';
    h += '</div><div class="cal-weekdays">';
    WDAYS.forEach(d => h += '<div class="cal-weekday">'+d+'</div>');
    h += '</div><div class="cal-days">';
    for (let i=firstDay-1;i>=0;i--) h += '<button class="cal-day other-month">'+(prevDim-i)+'</button>';
    for (let d=1;d<=dim;d++) {
      const iso = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      let c = 'cal-day';
      if (iso === todayISO) c += ' today';
      if (iso === item.dueDate) c += ' selected';
      h += '<button class="'+c+'" data-date="'+iso+'">'+d+'</button>';
    }
    const rem = (7-(firstDay+dim)%7)%7;
    for (let i=1;i<=rem;i++) h += '<button class="cal-day other-month">'+i+'</button>';
    h += '</div><div class="cal-quick-btns">';
    h += '<button class="cal-quick-btn'+(item.dueDate===todayISO?' active':'')+'" data-date="'+todayISO+'">Today</button>';
    h += '<button class="cal-quick-btn'+(item.dueDate===tmrwISO?' active':'')+'" data-date="'+tmrwISO+'">Tomorrow</button>';
    if (item.dueDate) h += '<button class="cal-clear-btn">Clear</button>';
    h += '</div></div>';
    gridDropdown.innerHTML = h;
    
    function pick(iso) {
      item.dueDate = iso; saveTasks();
      dateTile.className = 'sched-grid-item set';
      dateTile.innerHTML = ICAL_SVG + '<span class="gi-label">Date</span><span class="gi-value">' + fmtDate(iso) + '</span>';
      renderGridCal();
    }
    gridDropdown.querySelectorAll('.cal-day[data-date]').forEach(b => b.addEventListener('click', () => pick(b.dataset.date)));
    gridDropdown.querySelectorAll('.cal-quick-btn[data-date]').forEach(b => b.addEventListener('click', () => pick(b.dataset.date)));
    gridDropdown.querySelectorAll('.cal-nav').forEach(b => b.addEventListener('click', () => {
      calMonth += parseInt(b.dataset.dir);
      if (calMonth>11){calMonth=0;calYear++;}
      if (calMonth<0){calMonth=11;calYear--;}
      renderGridCal();
    }));
    const clr = gridDropdown.querySelector('.cal-clear-btn');
    if (clr) clr.addEventListener('click', () => {
      item.dueDate = null; saveTasks();
      dateTile.className = 'sched-grid-item';
      dateTile.innerHTML = ICAL_SVG + '<span class="gi-label">Date</span><span class="gi-value">Not set</span>';
      closeGridPanel();
    });
  }
  
  dateTile.addEventListener('click', () => {
    if (activeGridPanel === 'date') { closeGridPanel(); return; }
    activeGridPanel = 'date'; renderGridCal();
  });
  grid.appendChild(dateTile);
  
  // Time tile
  const timeTile = document.createElement('div');
  timeTile.className = 'sched-grid-item' + (item.dueTime ? ' set-time' : '');
  timeTile.innerHTML = ICLOCK_SVG + '<span class="gi-label">Time</span><span class="gi-value">' + (fmtTime(item.dueTime) || 'Not set') + '</span>';
  
  function renderGridTime() {
    const [h,m] = (item.dueTime||'09:00').split(':').map(Number);
    const h12 = h%12||12, ap = h>=12?'PM':'AM';
    gridDropdown.innerHTML = '<div class="time-picker">' +
      '<input class="time-input" type="text" maxlength="2" value="'+h12+'" data-f="h" inputmode="numeric">' +
      '<span class="time-sep">:</span>' +
      '<input class="time-input" type="text" maxlength="2" value="'+String(m).padStart(2,'0')+'" data-f="m" inputmode="numeric">' +
      '<div class="time-ampm"><button class="time-ampm-btn'+(ap==='AM'?' active':'')+'" data-v="AM">AM</button><button class="time-ampm-btn'+(ap==='PM'?' active':'')+'" data-v="PM">PM</button></div>' +
      '</div>' +
      '<div class="time-actions">' +
      (item.dueTime?'<button class="time-clear">Clear</button>':'<span></span>') +
      '<button class="time-set-btn">Set Time</button>' +
      '</div>';
    let curAP = ap;
    function save() {
      let hr = parseInt(gridDropdown.querySelector('[data-f="h"]').value)||12;
      let mn = parseInt(gridDropdown.querySelector('[data-f="m"]').value)||0;
      if(hr>12)hr=12;if(mn>59)mn=0;
      let h24=hr%12; if(curAP==='PM')h24+=12;
      item.dueTime=String(h24).padStart(2,'0')+':'+String(mn).padStart(2,'0');
      saveTasks();
      timeTile.className='sched-grid-item set-time';
      timeTile.innerHTML=ICLOCK_SVG+'<span class="gi-label">Time</span><span class="gi-value">'+fmtTime(item.dueTime)+'</span>';
    }
    gridDropdown.querySelectorAll('.time-input').forEach(i=>{i.addEventListener('input',save);i.addEventListener('focus',()=>i.select());});
    gridDropdown.querySelectorAll('.time-ampm-btn').forEach(b=>b.addEventListener('click',()=>{
      curAP=b.dataset.v;
      gridDropdown.querySelectorAll('.time-ampm-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); save();
    }));
    // Set button — confirm and close
    const setBtn=gridDropdown.querySelector('.time-set-btn');
    setBtn.addEventListener('click',()=>{ save(); closeGridPanel(); });
    const clr=gridDropdown.querySelector('.time-clear');
    if(clr)clr.addEventListener('click',()=>{
      item.dueTime=null;saveTasks();
      timeTile.className='sched-grid-item';timeTile.innerHTML=ICLOCK_SVG+'<span class="gi-label">Time</span><span class="gi-value">Not set</span>';
      closeGridPanel();
    });
  }
  
  timeTile.addEventListener('click', () => {
    if (activeGridPanel==='time'){closeGridPanel();return;}
    activeGridPanel='time'; renderGridTime();
  });
  grid.appendChild(timeTile);
  
  // Reminder tile
  const remLabel = item.reminder ? REMIND_OPTS.find(r=>r.key===item.reminder)?.label : null;
  const remTile = document.createElement('div');
  remTile.className = 'sched-grid-item' + (item.reminder ? ' set-remind' : '');
  remTile.innerHTML = IBELL_SVG + '<span class="gi-label">Reminder</span><span class="gi-value">' + (remLabel || 'None') + '</span>';
  
  function renderGridRemind() {
    gridDropdown.innerHTML = '<div class="option-chips">' +
      REMIND_OPTS.map(r=>'<button class="option-chip'+(item.reminder===r.key?' active-remind':'')+'" data-k="'+r.key+'">'+r.label+'</button>').join('') +
      (item.reminder?'<button class="cal-clear-btn">Clear</button>':'') + '</div>';
    gridDropdown.querySelectorAll('.option-chip').forEach(b=>b.addEventListener('click',()=>{
      item.reminder=b.dataset.k; saveTasks();
      const lab = REMIND_OPTS.find(r=>r.key===item.reminder).label;
      remTile.className='sched-grid-item set-remind';
      remTile.innerHTML=IBELL_SVG+'<span class="gi-label">Reminder</span><span class="gi-value">'+lab+'</span>';
      renderGridRemind();
    }));
    const clr=gridDropdown.querySelector('.cal-clear-btn');
    if(clr)clr.addEventListener('click',()=>{
      item.reminder=null;saveTasks();
      remTile.className='sched-grid-item';remTile.innerHTML=IBELL_SVG+'<span class="gi-label">Reminder</span><span class="gi-value">None</span>';
      closeGridPanel();
    });
  }
  
  remTile.addEventListener('click',()=>{
    if(activeGridPanel==='remind'){closeGridPanel();return;}
    activeGridPanel='remind';renderGridRemind();
  });
  grid.appendChild(remTile);
  
  // Repeat tile
  const repLabel = item.repeat ? REPEAT_OPTS.find(r=>r.key===item.repeat)?.label : null;
  const repTile = document.createElement('div');
  repTile.className = 'sched-grid-item' + (item.repeat ? ' set-repeat' : '');
  repTile.innerHTML = IREPEAT_SVG + '<span class="gi-label">Repeat</span><span class="gi-value">' + (repLabel || 'None') + '</span>';
  
  function renderGridRepeat() {
    gridDropdown.innerHTML = '<div class="option-chips">' +
      REPEAT_OPTS.map(r=>'<button class="option-chip'+(item.repeat===r.key?' active-repeat':'')+'" data-k="'+r.key+'">'+r.label+'</button>').join('') +
      (item.repeat?'<button class="cal-clear-btn">Clear</button>':'') + '</div>';
    gridDropdown.querySelectorAll('.option-chip').forEach(b=>b.addEventListener('click',()=>{
      item.repeat=b.dataset.k; saveTasks();
      const lab = REPEAT_OPTS.find(r=>r.key===item.repeat).label;
      repTile.className='sched-grid-item set-repeat';
      repTile.innerHTML=IREPEAT_SVG+'<span class="gi-label">Repeat</span><span class="gi-value">'+lab+'</span>';
      renderGridRepeat();
    }));
    const clr=gridDropdown.querySelector('.cal-clear-btn');
    if(clr)clr.addEventListener('click',()=>{
      item.repeat=null;saveTasks();
      repTile.className='sched-grid-item';repTile.innerHTML=IREPEAT_SVG+'<span class="gi-label">Repeat</span><span class="gi-value">None</span>';
      closeGridPanel();
    });
  }
  
  repTile.addEventListener('click',()=>{
    if(activeGridPanel==='repeat'){closeGridPanel();return;}
    activeGridPanel='repeat';renderGridRepeat();
  });
  grid.appendChild(repTile);
  
  editBody.appendChild(grid);
  editBody.appendChild(gridDropdown);
  
  // Divider
  const divider = document.createElement('div');
  divider.className = 'edit-divider';
  editBody.appendChild(divider);
  
  // Subtasks
  if (!item.subtasks) item.subtasks = [];
  const subListEl = document.createElement('div');
  subListEl.className = 'edit-sub-list';
  subListEl.dataset.role = 'sublist';
  editBody.appendChild(subListEl);
  renderEditSubs();
  
  // Tags
  // Tags section (no label, self-evident)
  
  const tagsRow = document.createElement('div');
  tagsRow.className = 'edit-tags';
  Object.keys(TAG_COLORS).forEach(key => {
    const tag = document.createElement('span');
    const isActive = item.tags.some(t => t.name === TAG_COLORS[key].name);
    tag.className = 'edit-tag ' + (isActive ? 'active-' + key : 'inactive-' + key);
    tag.textContent = TAG_COLORS[key].name;
    if (isActive) tag.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:4px"><path d="M20 6L9 17l-5-5"/></svg>' + TAG_COLORS[key].name;
    tag.addEventListener('click', () => {
      const idx = item.tags.findIndex(t => t.name === TAG_COLORS[key].name);
      if (idx >= 0) {
        item.tags.splice(idx, 1);
        tag.className = 'edit-tag inactive-' + key;
        tag.textContent = TAG_COLORS[key].name;
      } else {
        item.tags.push({ name: TAG_COLORS[key].name, color: TAG_COLORS[key].bg });
        tag.className = 'edit-tag active-' + key;
        tag.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:4px"><path d="M20 6L9 17l-5-5"/></svg>' + TAG_COLORS[key].name;
      }
      saveTasks();
    });
    tagsRow.appendChild(tag);
  });
  
  // + New tag chip
  const addTagChip = document.createElement('span');
  addTagChip.className = 'edit-tag add-new';
  addTagChip.textContent = '+ New';
  addTagChip.addEventListener('click', () => {
    // Remove existing form if open
    const existing = editBody.querySelector('.new-tag-form');
    if (existing) { existing.remove(); editBody.querySelector('.new-tag-color-row')?.remove(); editBody.querySelector('.new-tag-save')?.remove(); return; }
    
    const form = document.createElement('div');
    form.className = 'new-tag-form';
    form.innerHTML = '<input type="text" placeholder="Tag name" maxlength="15" enterkeyhint="done">';
    
    const colorRow = document.createElement('div');
    colorRow.className = 'new-tag-color-row';
    const colors = ['#6B7F4A','#C47E6E','#C8923E','#7B8494','#9B7AA0','#C45D52','#5B8A72','#8B7355'];
    let selectedColor = colors[0];
    colors.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'new-tag-color' + (c === selectedColor ? ' selected' : '');
      dot.style.background = c;
      dot.addEventListener('click', () => {
        colorRow.querySelectorAll('.new-tag-color').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
        selectedColor = c;
      });
      colorRow.appendChild(dot);
    });
    
    const saveBtn = document.createElement('button');
    saveBtn.className = 'new-tag-save';
    saveBtn.textContent = 'Add Tag';
    saveBtn.addEventListener('click', () => {
      const name = form.querySelector('input').value.trim().toUpperCase();
      if (!name) return;
      if (!item.tags.some(t => t.name === name)) {
        item.tags.push({ name: name, color: selectedColor });
        saveTasks();
        // Remove form elements
        form.remove(); colorRow.remove(); saveBtn.remove();
        // Add new tag chip to the row (before + New)
        const newTag = document.createElement('span');
        newTag.className = 'edit-tag active-custom';
        newTag.style.cssText = 'background:' + selectedColor + ';opacity:1;color:#fff;';
        newTag.textContent = name;
        newTag.addEventListener('click', () => {
          const idx = item.tags.findIndex(t => t.name === name);
          if (idx >= 0) { item.tags.splice(idx, 1); newTag.remove(); saveTasks(); }
        });
        tagsRow.insertBefore(newTag, addTagChip);
      }
    });
    
    form.querySelector('input').addEventListener('keydown', e => { if (e.key === 'Enter') saveBtn.click(); });
    
    tagsRow.after(form);
    form.after(colorRow);
    colorRow.after(saveBtn);
    form.querySelector('input').focus();
  });
  tagsRow.appendChild(addTagChip);
  
  editBody.appendChild(tagsRow);
  
  // Delete button at bottom
  const delBtn = document.createElement('button');
  delBtn.className = 'edit-panel-delete-bottom';
  delBtn.textContent = 'Delete this task';
  delBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => t.id !== item.id);
    saveTasks();
    closeEditPanel();
  });
  editBody.appendChild(delBtn);
  
  // Show panel
  requestAnimationFrame(() => {
    editOverlay.classList.add('active');
    editPanel.classList.add('active');
    // Prevent keyboard auto-popup on mobile
    if (document.activeElement) document.activeElement.blur();
  });
}

function renderEditSubs() {
  // Remove old sub rows and add-sub button
  document.querySelectorAll('.edit-sub-row, .edit-add-sub').forEach(el => el.remove());
  
  const subList = editBody.querySelector('[data-role="sublist"]');
  if (!subList) return;
  // Clear existing sub rows inside the list
  subList.innerHTML = '';
  let insertTarget = subList;
  
  editingItem.subtasks.forEach((sub, i) => {
    const row = document.createElement('div');
    row.className = 'edit-sub-row';
    
    const circle = document.createElement('div');
    circle.className = 'edit-sub-circle' + (sub.done ? ' done' : '');
    circle.innerHTML = CHECK_SVG;
    circle.addEventListener('click', () => {
      sub.done = !sub.done;
      circle.classList.toggle('done');
      input.classList.toggle('done-text');
      saveTasks();
    });
    
    const input = document.createElement('input');
    input.className = 'edit-sub-input' + (sub.done ? ' done-text' : '');
    input.value = sub.title;
    input.placeholder = 'Step name';
    input.addEventListener('input', () => { sub.title = input.value; saveTasks(); });
    input.addEventListener('blur', () => {
      if (!sub.title.trim()) {
        const idx = editingItem.subtasks.indexOf(sub);
        if (idx >= 0) { editingItem.subtasks.splice(idx, 1); saveTasks(); renderEditSubs(); }
      }
    });
    
    const del = document.createElement('button');
    del.className = 'edit-sub-delete';
    del.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    del.addEventListener('click', () => {
      editingItem.subtasks.splice(i, 1);
      saveTasks();
      renderEditSubs();
    });
    
    row.appendChild(circle);
    row.appendChild(input);
    row.appendChild(del);
    insertTarget.appendChild(row);
  });
  
  // Add sub button (outside the connected list)
  const existingAdd = editBody.querySelector('.edit-add-sub');
  if (existingAdd) existingAdd.remove();
  const addBtn = document.createElement('button');
  addBtn.className = 'edit-add-sub';
  addBtn.innerHTML = PLUS_SVG + ' Add Sub-task';
  addBtn.addEventListener('click', () => {
    editingItem.subtasks.push(mkSub('', ''));
    saveTasks();
    renderEditSubs();
    // Focus the new input
    const inputs = editBody.querySelectorAll('.edit-sub-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });
  subList.after(addBtn);
}


// ═══ SCHEDULE UI ═══
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDAYS = ['S','M','T','W','T','F','S'];

function fmtDate(iso) {
  if (!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const tmrw = new Date(today); tmrw.setDate(tmrw.getDate() + 1);
  if (d.getTime() === today.getTime()) return 'Today';
  if (d.getTime() === tmrw.getTime()) return 'Tomorrow';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtTime(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return (h % 12 || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h >= 12 ? 'PM' : 'AM');
}

const REMIND_OPTS = [{key:'at_time',label:'At time'},{key:'5min',label:'5 min'},{key:'15min',label:'15 min'},{key:'30min',label:'30 min'},{key:'1hr',label:'1 hour'}];
const REPEAT_OPTS = [{key:'daily',label:'Daily'},{key:'weekdays',label:'Weekdays'},{key:'weekly',label:'Weekly'},{key:'monthly',label:'Monthly'}];
const REPEAT_OPTS_MAP = Object.fromEntries(REPEAT_OPTS.map(r => [r.key, r.label]));

function buildScheduleSection(container, item) {
  const grid = document.createElement('div');
  grid.className = 'sched-grid';
  const gridDropdown = document.createElement('div');
  gridDropdown.className = 'sched-grid-dropdown';
  let activePanel = null;
  
  function closePanel() { gridDropdown.innerHTML = ''; activePanel = null; }
  
  // DATE tile
  const dateTile = document.createElement('div');
  dateTile.className = 'sched-grid-item' + (item.dueDate ? ' set' : '');
  dateTile.innerHTML = ICAL_SVG + '<span class="gi-label">Date</span><span class="gi-value">' + (fmtDate(item.dueDate) || 'Not set') + '</span>';
  
  let calMonth = item.dueDate ? new Date(item.dueDate+'T00:00:00').getMonth() : new Date().getMonth();
  let calYear = item.dueDate ? new Date(item.dueDate+'T00:00:00').getFullYear() : new Date().getFullYear();
  
  function renderCal() {
    const today = new Date(); today.setHours(0,0,0,0);
    const todayISO = today.toISOString().slice(0,10);
    const tmrw = new Date(today); tmrw.setDate(tmrw.getDate()+1);
    const tmrwISO = tmrw.toISOString().slice(0,10);
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const dim = new Date(calYear, calMonth+1, 0).getDate();
    const prevDim = new Date(calYear, calMonth, 0).getDate();
    
    let h = '<div class="cal-picker"><div class="cal-header">';
    h += '<button class="cal-nav" data-dir="-1"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>';
    h += '<span class="cal-month">'+MONTHS[calMonth]+' '+calYear+'</span>';
    h += '<button class="cal-nav" data-dir="1"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>';
    h += '</div><div class="cal-weekdays">';
    WDAYS.forEach(d => h += '<div class="cal-weekday">'+d+'</div>');
    h += '</div><div class="cal-days">';
    for (let i=firstDay-1;i>=0;i--) h += '<button class="cal-day other-month">'+(prevDim-i)+'</button>';
    for (let d=1;d<=dim;d++) {
      const iso = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      let c = 'cal-day';
      if (iso === todayISO) c += ' today';
      if (iso === item.dueDate) c += ' selected';
      h += '<button class="'+c+'" data-date="'+iso+'">'+d+'</button>';
    }
    const rem = (7-(firstDay+dim)%7)%7;
    for (let i=1;i<=rem;i++) h += '<button class="cal-day other-month">'+i+'</button>';
    h += '</div><div class="cal-quick-btns">';
    h += '<button class="cal-quick-btn'+(item.dueDate===todayISO?' active':'')+'" data-date="'+todayISO+'">Today</button>';
    h += '<button class="cal-quick-btn'+(item.dueDate===tmrwISO?' active':'')+'" data-date="'+tmrwISO+'">Tomorrow</button>';
    if (item.dueDate) h += '<button class="cal-clear-btn">Clear</button>';
    h += '</div></div>';
    gridDropdown.innerHTML = h;
    
    function pick(iso) {
      item.dueDate = iso;
      dateTile.className = 'sched-grid-item set';
      dateTile.innerHTML = ICAL_SVG + '<span class="gi-label">Date</span><span class="gi-value">' + fmtDate(iso) + '</span>';
      renderCal();
    }
    gridDropdown.querySelectorAll('.cal-day[data-date]').forEach(b => b.addEventListener('click', () => pick(b.dataset.date)));
    gridDropdown.querySelectorAll('.cal-quick-btn[data-date]').forEach(b => b.addEventListener('click', () => pick(b.dataset.date)));
    gridDropdown.querySelectorAll('.cal-nav').forEach(b => b.addEventListener('click', () => {
      calMonth += parseInt(b.dataset.dir);
      if (calMonth>11){calMonth=0;calYear++;}
      if (calMonth<0){calMonth=11;calYear--;}
      renderCal();
    }));
    const clr = gridDropdown.querySelector('.cal-clear-btn');
    if (clr) clr.addEventListener('click', () => {
      item.dueDate = null;
      dateTile.className = 'sched-grid-item';
      dateTile.innerHTML = ICAL_SVG + '<span class="gi-label">Date</span><span class="gi-value">Not set</span>';
      closePanel();
    });
  }
  
  dateTile.addEventListener('click', () => {
    if (activePanel === 'date') { closePanel(); return; }
    activePanel = 'date'; renderCal();
  });
  grid.appendChild(dateTile);
  
  // TIME tile
  const timeTile = document.createElement('div');
  timeTile.className = 'sched-grid-item' + (item.dueTime ? ' set-time' : '');
  timeTile.innerHTML = ICLOCK_SVG + '<span class="gi-label">Time</span><span class="gi-value">' + (fmtTime(item.dueTime) || 'Not set') + '</span>';
  
  function renderTime() {
    const [h,m] = (item.dueTime||'09:00').split(':').map(Number);
    const h12 = h%12||12, ap = h>=12?'PM':'AM';
    gridDropdown.innerHTML = '<div class="time-picker">' +
      '<input class="time-input" type="text" maxlength="2" value="'+h12+'" data-f="h" inputmode="numeric">' +
      '<span class="time-sep">:</span>' +
      '<input class="time-input" type="text" maxlength="2" value="'+String(m).padStart(2,'0')+'" data-f="m" inputmode="numeric">' +
      '<div class="time-ampm"><button class="time-ampm-btn'+(ap==='AM'?' active':'')+'" data-v="AM">AM</button><button class="time-ampm-btn'+(ap==='PM'?' active':'')+'" data-v="PM">PM</button></div>' +
      '</div>' +
      '<div class="time-actions">' +
      (item.dueTime?'<button class="time-clear">Clear</button>':'<span></span>') +
      '<button class="time-set-btn">Set Time</button>' +
      '</div>';
    let curAP = ap;
    function save() {
      let hr = parseInt(gridDropdown.querySelector('[data-f="h"]').value)||12;
      let mn = parseInt(gridDropdown.querySelector('[data-f="m"]').value)||0;
      if(hr>12)hr=12;if(mn>59)mn=0;
      let h24=hr%12; if(curAP==='PM')h24+=12;
      item.dueTime=String(h24).padStart(2,'0')+':'+String(mn).padStart(2,'0');
      timeTile.className='sched-grid-item set-time';
      timeTile.innerHTML=ICLOCK_SVG+'<span class="gi-label">Time</span><span class="gi-value">'+fmtTime(item.dueTime)+'</span>';
    }
    gridDropdown.querySelectorAll('.time-input').forEach(i=>{i.addEventListener('input',save);i.addEventListener('focus',()=>i.select());});
    gridDropdown.querySelectorAll('.time-ampm-btn').forEach(b=>b.addEventListener('click',()=>{
      curAP=b.dataset.v;
      gridDropdown.querySelectorAll('.time-ampm-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); save();
    }));
    const setBtn=gridDropdown.querySelector('.time-set-btn');
    setBtn.addEventListener('click',()=>{ save(); closePanel(); });
    const clr=gridDropdown.querySelector('.time-clear');
    if(clr)clr.addEventListener('click',()=>{
      item.dueTime=null;
      timeTile.className='sched-grid-item';timeTile.innerHTML=ICLOCK_SVG+'<span class="gi-label">Time</span><span class="gi-value">Not set</span>';
      closePanel();
    });
  }
  
  timeTile.addEventListener('click', () => {
    if (activePanel==='time'){closePanel();return;}
    activePanel='time'; renderTime();
  });
  grid.appendChild(timeTile);
  
  // REMINDER tile
  const remLabel = item.reminder ? REMIND_OPTS.find(r=>r.key===item.reminder)?.label : null;
  const remTile = document.createElement('div');
  remTile.className = 'sched-grid-item' + (item.reminder ? ' set-remind' : '');
  remTile.innerHTML = IBELL_SVG + '<span class="gi-label">Reminder</span><span class="gi-value">' + (remLabel || 'None') + '</span>';
  
  function renderRemind() {
    gridDropdown.innerHTML = '<div class="option-chips">' +
      REMIND_OPTS.map(r=>'<button class="option-chip'+(item.reminder===r.key?' active-remind':'')+'" data-k="'+r.key+'">'+r.label+'</button>').join('') +
      (item.reminder?'<button class="cal-clear-btn">Clear</button>':'') + '</div>';
    gridDropdown.querySelectorAll('.option-chip').forEach(b=>b.addEventListener('click',()=>{
      item.reminder=b.dataset.k;
      const lab = REMIND_OPTS.find(r=>r.key===item.reminder).label;
      remTile.className='sched-grid-item set-remind';
      remTile.innerHTML=IBELL_SVG+'<span class="gi-label">Reminder</span><span class="gi-value">'+lab+'</span>';
      renderRemind();
    }));
    const clr=gridDropdown.querySelector('.cal-clear-btn');
    if(clr)clr.addEventListener('click',()=>{
      item.reminder=null;
      remTile.className='sched-grid-item';remTile.innerHTML=IBELL_SVG+'<span class="gi-label">Reminder</span><span class="gi-value">None</span>';
      closePanel();
    });
  }
  
  remTile.addEventListener('click',()=>{
    if(activePanel==='remind'){closePanel();return;}
    activePanel='remind';renderRemind();
  });
  grid.appendChild(remTile);
  
  // REPEAT tile
  const repLabel = item.repeat ? REPEAT_OPTS.find(r=>r.key===item.repeat)?.label : null;
  const repTile = document.createElement('div');
  repTile.className = 'sched-grid-item' + (item.repeat ? ' set-repeat' : '');
  repTile.innerHTML = IREPEAT_SVG + '<span class="gi-label">Repeat</span><span class="gi-value">' + (repLabel || 'None') + '</span>';
  
  function renderRepeat() {
    gridDropdown.innerHTML = '<div class="option-chips">' +
      REPEAT_OPTS.map(r=>'<button class="option-chip'+(item.repeat===r.key?' active-repeat':'')+'" data-k="'+r.key+'">'+r.label+'</button>').join('') +
      (item.repeat?'<button class="cal-clear-btn">Clear</button>':'') + '</div>';
    gridDropdown.querySelectorAll('.option-chip').forEach(b=>b.addEventListener('click',()=>{
      item.repeat=b.dataset.k;
      const lab = REPEAT_OPTS.find(r=>r.key===item.repeat).label;
      repTile.className='sched-grid-item set-repeat';
      repTile.innerHTML=IREPEAT_SVG+'<span class="gi-label">Repeat</span><span class="gi-value">'+lab+'</span>';
      renderRepeat();
    }));
    const clr=gridDropdown.querySelector('.cal-clear-btn');
    if(clr)clr.addEventListener('click',()=>{
      item.repeat=null;
      repTile.className='sched-grid-item';repTile.innerHTML=IREPEAT_SVG+'<span class="gi-label">Repeat</span><span class="gi-value">None</span>';
      closePanel();
    });
  }
  
  repTile.addEventListener('click',()=>{
    if(activePanel==='repeat'){closePanel();return;}
    activePanel='repeat';renderRepeat();
  });
  grid.appendChild(repTile);
  
  container.appendChild(grid);
  container.appendChild(gridDropdown);
}


function closeEditPanel() {
  editOverlay.classList.remove('active');
  editPanel.classList.remove('active');
  // Clean up empty subtasks
  if (editingItem && editingItem.subtasks) {
    editingItem.subtasks = editingItem.subtasks.filter(s => s.title.trim() !== '');
    saveTasks();
  }
  editingItem = null;
  renderAll();
}

editClose.addEventListener('click', closeEditPanel);
editDone.addEventListener('click', closeEditPanel);
editOverlay.addEventListener('click', closeEditPanel);


// ═══ INIT ═══
initBottomSheet();
const DATA_VERSION = 'v5';
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES_SHORT = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function buildDayPicker() {
  const picker = document.getElementById('dayPicker');
  const label = document.getElementById('heroMonth');
  picker.innerHTML = '';
  
  // Show 7 days centered on currentDate (3 before, current, 3 after)
  for (let offset = -3; offset <= 3; offset++) {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + offset);
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (offset === 0 ? ' active' : '');
    pill.innerHTML = `<span class="day-pill-name">${DAY_NAMES[d.getDay()]}</span><span class="day-pill-num">${d.getDate()}</span>`;
    pill.addEventListener('click', () => {
      switchToDate(d);
    });
    picker.appendChild(pill);
  }
  
  label.innerHTML = MONTH_NAMES_SHORT[currentDate.getMonth()] + ', <span>' + currentDate.getFullYear() + '</span>';
  // Update hero day name
  const fullDayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const heroDateEl = document.getElementById('heroDate');
  if (heroDateEl) {
    const remaining = tasks.filter(t => t.date === dateKey(currentDate) && !t.completed && !(t.subtasks && t.subtasks.every(s => s.done))).length;
    heroDateEl.innerHTML = fullDayNames[currentDate.getDay()] + ' · <span id="heroRemaining">' + remaining + '</span> tasks remaining';
  }
}

function switchToDate(d) {
  // Save current tasks
  saveTasks();
  // Switch date
  currentDate = new Date(d);
  currentDate.setHours(0,0,0,0);
  // Load tasks for new date
  let saved = null;
  try {
    if (localStorage.getItem('proud_version') === DATA_VERSION) {
      saved = loadTasks();
      if (saved) saved.forEach(t => { if (!t.subtasks) t.subtasks = []; if (t.dueDate === undefined) t.dueDate = null; if (t.dueTime === undefined) t.dueTime = null; if (t.reminder === undefined) t.reminder = null; if (t.repeat === undefined) t.repeat = null; });
    }
  } catch(e) {}
  tasks = saved && saved.length > 0 ? saved : [];
  buildDayPicker();
  renderAll();
}

// Initial load
let saved = null;
try {
  if (localStorage.getItem('proud_version') === DATA_VERSION) {
    saved = loadTasks();
    if (saved) saved.forEach(t => { if (!t.subtasks) t.subtasks = []; if (t.dueDate === undefined) t.dueDate = null; if (t.dueTime === undefined) t.dueTime = null; if (t.reminder === undefined) t.reminder = null; if (t.repeat === undefined) t.repeat = null; });
  } else {
    Object.keys(localStorage).filter(k => k.startsWith('proud_')).forEach(k => localStorage.removeItem(k));
    localStorage.setItem('proud_version', DATA_VERSION);
  }
} catch(e) {}
tasks = saved && saved.length > 0 ? saved : defaultTasks();
buildDayPicker();
renderAll();

document.querySelector('.tab-fab').addEventListener('click', showAddForm);
